# Alembic configuration for RAPai Ontology Phase II PostgreSQL migrations

[alembic]
# path to migration scripts
script_location = .

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.datetime.now().astimezone()
#
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# set to 40 to truncate generated slashes to 40
# char length
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# when set to 'true', Alembic will log source the
# ddl statements executed as well as pond result messages
# to the logger as they occur.
# ideally, this is fine grained enough to not use up too much log space
# but explosive enough to not miss any problems
# the filtering keywords available are 'key', 'attr', 'type', 'name', 'table'
#
# sqlalchemy.url = driver://user:pass@localhost/dbname

sqlalchemy.url = postgresql://localhost/rapai_dev


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
